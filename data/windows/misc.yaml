---
cis_security_hardening_windows::misc_registry:

## custom additions

# Puppet use dedicated Event Log entry
  'HKLM\SYSTEM\CurrentControlSet\Services\EventLog\Puppet\Puppet\EventMessageFile':
    ensure: present
    data:   '%SystemRoot%\System32\EventCreate.exe'
    type:   'expand'
  'HKLM\SYSTEM\CurrentControlSet\Services\EventLog\Puppet\Puppet\TypesSupported':
    ensure: present
    data:   '7'

