cis_security_hardening_windows::cis_standalone_optout:
  - "(L1) Ensure 'Domain member: Digitally encrypt or sign secure channel data (always)' is set to 'Enabled'"
  - "(L1) Ensure 'Domain member: Digitally encrypt secure channel data (when possible)' is set to 'Enabled'"
  - "(L1) Ensure 'Domain member: Digitally sign secure channel data (when possible)' is set to 'Enabled'"
  - "(L1) Ensure 'Domain member: Disable machine account password changes' is set to 'Disabled'"
  - "(L1) Ensure 'Domain member: Maximum machine account password age' is set to '30 or fewer days, but not 0'"
  - "(L1) Ensure 'Domain member: Require strong (Windows 2000 or later) session key' is set to 'Enabled'"
  - "(L1) Ensure 'Windows Firewall: Domain: Firewall state' is set to 'On (recommended)'"
  - "(L1) Ensure 'Windows Firewall: Domain: Inbound connections' is set to 'Block (default)'"
  - "(L1) Ensure 'Windows Firewall: Domain: Outbound connections' is set to 'Allow (default)'"
  - "(L1) Ensure 'Windows Firewall: Domain: Settings: Display a notification' is set to 'No'"
  - "(L1) Ensure 'Windows Firewall: Domain: Logging: Name' is set to '%SYSTEMROOT%\\System32\\logfiles\\firewall\\domainfw.log'"
  - "(L1) Ensure 'Windows Firewall: Domain: Logging: Size limit (KB)' is set to '16,384 KB or greater'"
  - "(L1) Ensure 'Windows Firewall: Domain: Logging: Log dropped packets' is set to 'Yes'"
  - "(L1) Ensure 'Windows Firewall: Domain: Logging: Log successful connections' is set to 'Yes'"
  - "(L1) Ensure 'Do not allow password expiration time longer than required by policy' is set to 'Enabled'"
  - "(L1) Ensure 'Enable Local Admin Password Management' is set to 'Enabled'"
  - "(L1) Ensure 'Password Settings: Password Complexity' is set to 'Enabled: Large letters + small letters + numbers + special characters'"
  - "(L1) Ensure 'Password Settings: Password Length' is set to 'Enabled: 15 or more'"
  - "(L1) Ensure 'Password Settings: Password Age (Days)' is set to 'Enabled: 30 or fewer'"
  - "(L1) Ensure 'Apply UAC restrictions to local accounts on network logons' is set to 'Enabled'"
  - "(L1) Ensure 'Require domain users to elevate when setting a networks location' is set to 'Enabled'"
  - "(L1) Ensure 'Prohibit connection to non-domain networks when connected to domain authenticated network' is set to 'Enabled'"
  - "(L1) Ensure 'Configure registry policy processing: Do not apply during periodic background processing' is set to 'Enabled: FALSE'"
  - "(L1) Ensure 'Configure registry policy processing: Process even if the Group Policy objects have not changed' is set to 'Enabled: TRUE'"
  - "(L1) Ensure 'Turn off background refresh of Group Policy is set' to 'Disabled'"
  - "(L1) Ensure 'Do not enumerate connected users on domain-joined computers' is set to 'Enabled'"
  - "(L1) Ensure 'Enumerate local users on domain-joined computers' is set to 'Disabled'"
  - "(L1) Ensure 'Turn off picture password sign-in' is set to 'Enabled'"
  - "(L2) Ensure 'Interactive logon: Number of previous logons to cache (in case domain controller is not available)' is set to '4 or fewer logon(s)'"
  - "(L2) Ensure 'Enable Windows NTP Client' is set to 'Enabled'"
  - "(L2) Ensure 'Enable Windows NTP Server' is set to 'Disabled'"


# Standalone location fixes, eg firewall logging files did not take effect with the Enterprise location
cis_security_hardening_windows::cis_standalone_overrides:
# --- Private Profile (CIS Standard Requirements) ---
  "(L1) Ensure 'Windows Firewall: Standard: Firewall state' is set to 'On'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\EnableFirewall':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Standard: Inbound connections' is set to 'Block'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\DefaultInboundAction':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Standard: Settings: Display a notification' is set to 'No'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\DisableNotifications':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Standard: Logging: Name' is configured":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\Logging\LogFilePath':
      ensure: present
      type:   'string'
      data:   'C:\Windows\System32\logfiles\firewall\privatefw.log'

  "(L1) Ensure 'Windows Firewall: Standard: Logging: Size limit' is set to '16384'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\Logging\LogFileSize':
      ensure: present
      data:   16384

  "(L1) Ensure 'Windows Firewall: Standard: Logging: Log dropped packets' is set to 'Yes'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\Logging\LogDroppedPackets':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Standard: Logging: Log successful connections' is set to 'Yes'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\Logging\LogSuccessfulConnections':
      ensure: present

# --- Public Profile (CIS Public Requirements) ---
  "(L1) Ensure 'Windows Firewall: Public: Firewall state' is set to 'On'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\EnableFirewall':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Public: Inbound connections' is set to 'Block'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\DefaultInboundAction':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Public: Settings: Display a notification' is set to 'No'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\DisableNotifications':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Public: Logging: Name' is configured":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\Logging\LogFilePath':
      ensure: present
      type:   'string'
      data:   'C:\Windows\System32\logfiles\firewall\publicfw.log'

  "(L1) Ensure 'Windows Firewall: Public: Logging: Size limit' is set to '16384'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\Logging\LogFileSize':
      ensure: present
      data:   16384

  "(L1) Ensure 'Windows Firewall: Public: Logging: Log dropped packets' is set to 'Yes'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\Logging\LogDroppedPackets':
      ensure: present

  "(L1) Ensure 'Windows Firewall: Public: Logging: Log successful connections' is set to 'Yes'":
    'HKLM\SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\PublicProfile\Logging\LogSuccessfulConnections':
      ensure: present

